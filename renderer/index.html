<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <script src="./error_logger.js"></script>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; child-src 'self' blob:; connect-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob: data:;" />
  <title>Desktop Mascot</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      font-family: -apple-system, sans-serif;
    }
    #stage { width: 100%; height: 100%; }

    /* 操作パネル: 普段は薄く、ホバーで濃く */
    #panel {
      position: fixed;
      top: 8px;
      left: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-start;
      padding: 6px 8px;
      background: rgba(20, 20, 28, 0.35);
      border-radius: 10px;
      color: #fff;
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }
    #panel:hover { opacity: 1; }
    #panel select, #panel button, #panel label {
      font-size: 11px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 6px;
      cursor: pointer;
    }
    #file { display: none; }
    
    /* グラフ用コンテナ */
    #graphContainer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 160px;
      background: rgba(20, 20, 28, 0.9);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: none;
      z-index: 10;
      pointer-events: none;
    }
    #debugGraph {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <div id="panel">
    <div style="display: flex; gap: 6px; align-items: center; width: 100%;">
      <select id="source" title="入力音源を選択" style="flex: 1;">
        <option value="">— 入力音源を選択 —</option>
        <option value="system">🖥 システム音声 (Mac 13.0+)</option>
      </select>
      <button id="toggleGraph" title="グラフ表示切替">📈</button>
      <button id="quit" title="終了">✕</button>
    </div>
    <div style="display: flex; gap: 6px; align-items: center; width: 100%;">
      <select id="outputSel" title="出力先を選択" style="flex: 1;">
        <option value="">— 出力先を選択 —</option>
      </select>
      <label style="display: flex; align-items: center; gap: 4px; padding: 2px 6px;" title="入力音をスピーカーから出力する">
        <input type="checkbox" id="passthrough" style="margin: 0; cursor: pointer;">
        モニター
        <input type="range" id="monitorVolume" min="0" max="1000" value="100" style="width: 50px; margin: 0; cursor: pointer;" title="モニター音量">
      </label>
    </div>
  </div>

  <div id="graphContainer">
    <canvas id="debugGraph"></canvas>
  </div>

  <script type="module" src="./dist/bundle.js"></script>
</body>
</html>
